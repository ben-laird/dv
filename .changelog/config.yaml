# dv dogfooding itself.
#
# This repo is a monorepo:
#   apps/cli      — the dv CLI (Deno)
#   apps/docs     — the VitePress docs site (Node)
#   packages/*    — shared Deno libs (none yet)
#
# Once the corresponding example plugins exist, uncomment the block below
# and dv will manage its own releases.
#
# discovery:
#   plugins:
#     - match: "apps/cli"
#       use: ./examples/plugins/deno
#     - match: "apps/docs"
#       use: ./examples/plugins/npm
#     - match: "packages/*"
#       use: ./examples/plugins/deno
#
# tagging:
#   format: "{package-name}@{version}"
#
# Records you author with `dv add` land in .changelog/records/.
