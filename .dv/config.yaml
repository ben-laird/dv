# yaml-language-server: $schema=../specs/schemas/config.json
# dv dogfooding itself.
#
# This repo is a monorepo:
#   apps/cli      — the dv CLI (Deno)
#   apps/docs     — the VitePress docs site (Node, no published name)
#   packages/*    — shared Deno libs (none yet)
#
# The example Deno plugin claims every workspace member with a `name` field
# in its deno.json. apps/docs is intentionally name-less and is silently
# skipped (specs/config-format.md § Matching rules).

discovery:
  plugins:
    - match:
        - "apps/*"
        - "packages/*"
      use: ./examples/plugins/deno

# Long-form companion to CHANGELOG.md — `dv version` writes HISTORY.md
# alongside CHANGELOG.md when enabled. CHANGELOG stays terse (Keep a
# Changelog bullets); HISTORY carries each Record's full body prose
# under per-version h3 subsections. See specs/config-format.md § history.
history:
  enabled: true

# Records you author with `dv add` land in .dv/records/.
