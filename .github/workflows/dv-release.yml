# Release on merge to main — the one-trunk GitHub Flow model.
#
# main is both our nightly branch and our release branch: every push to
# main is a nightly, and the git tags this job mints (pkg@x.y.z) are the
# official releases. There is no separate Release PR — the feature PR that
# merged here was the code review AND the release review, since the bump
# is derived deterministically from the Records it carried.
#
# The job is a no-op on commits with no pending Records (~5s): dv release
# is stateless, computing the awaiting-release set from git tags. All the
# orchestration logic lives in .github/scripts/release.ts (Deno, so it is
# cross-platform and can mint GitHub Releases via the official client) —
# this YAML just wires up the environment and calls it.
#
# Live on every merge to main. There's deliberately no enable/disable repo
# variable: the model's whole point is that a merge IS the release, and an
# out-of-band GitHub setting that silently turns that off is exactly the
# kind of coupling we avoid. The no-op-when-nothing-pending behavior is the
# safety, not a feature flag.

name: release

on:
  push:
    branches: [main]
  # Manual trigger for first-run + partial-failure recovery
  # (--force re-runs publish ops on already-tagged packages).
  workflow_dispatch:
    inputs:
      force:
        description: "Pass --force to re-run publish ops on already-tagged packages (recovery)"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    # Skip dv's own bump commits to avoid recursion (the bump pushed to
    # main in step 4 of release.ts would otherwise re-trigger this job).
    # The guard matches dv's default `git.commit-message-template`
    # (`chore(release): ...`). This is intrinsic workflow logic, not a
    # feature flag — it lives in the file, not in a GitHub repo variable.
    if: "!contains(github.event.head_commit.message, 'chore(release):')"

    permissions:
      contents: write   # push the bump commit + tags, create GitHub Releases
      id-token: write   # OIDC for `deno publish` auth to JSR

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          # Use the PAT, not the default GITHUB_TOKEN: the bump commit
          # pushed to protected main needs the bot's protection bypass,
          # and PAT-driven pushes correctly trigger downstream workflows
          # (e.g. a docs deploy listening on tag events). Configure DV_PAT
          # with `contents: write` + `workflows: write` scopes.
          token: ${{ secrets.DV_PAT }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Install dv from the working tree. We write our own launcher rather
      # than `deno install --global`: the latter snapshots the entry file
      # and loses the workspace `imports` map (so `@dv-cli/clipc` wouldn't
      # resolve). This is the one piece that stays shell — it's the
      # documented install shape; rewriting it in Deno would be circular.
      - name: install dv from source
        run: |
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/dv" <<EOF
          #!/bin/sh
          exec deno run --allow-all \\
            --config "$GITHUB_WORKSPACE/apps/cli/deno.json" \\
            "$GITHUB_WORKSPACE/apps/cli/src/main.ts" \\
            "\$@"
          EOF
          chmod +x "$HOME/.local/bin/dv"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: configure git identity
        run: |
          git config user.name "dv-release-bot"
          git config user.email "dv-release-bot@users.noreply.github.com"

      # All the orchestration: capture the pending Plan, version, push the
      # bump to main, release (tag + publish), and mint one GitHub Release
      # per minted tag. inputs.force is empty on push-triggered runs.
      - name: release
        env:
          DV_PAT: ${{ secrets.DV_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          FORCE=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE="--force"
            echo "::warning::Running with --force; publish ops will re-run on already-tagged packages."
          fi
          deno run \
            --allow-run --allow-read --allow-env --allow-net \
            "$GITHUB_WORKSPACE/.github/scripts/release.ts" $FORCE
