# Tag + publish packages whose current version isn't tagged yet.
#
# Stateless by design — dv release computes the awaiting-release set
# from git tags, so this workflow is safe to run on every push to
# main. On non-release commits, the set is empty and the run is a
# no-op (~5 seconds). On the merged Release PR commit, every bumped
# package gets tagged and published.
#
# Publishing is wired to tools/dv-release/main.ts (a repo-local
# specialisation of the example deno plugin) which runs `deno
# publish` for real. OIDC handles JSR auth automatically when the
# job has id-token: write — no JSR_TOKEN secret needed once trusted
# publishing is configured on JSR for this repo.
#
# Like the prepare workflow, this is dormant until DV_RELEASE_ENABLED
# is flipped to true. The first 1.0 release is a deliberate manual
# call; only after that does it make sense to publish from CI.

name: release

on:
  push:
    branches: [main]
  # Manual trigger for first-run + partial-failure recovery
  # (--force re-runs publish ops on already-tagged packages).
  workflow_dispatch:
    inputs:
      force:
        description: "Pass --force to re-run publish ops on already-tagged packages (recovery)"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    # Same enablement gate as prepare-release. Flip
    # `DV_RELEASE_ENABLED` to `true` in the repo's variables after
    # the first manual `dv release` has succeeded.
    if: vars.DV_RELEASE_ENABLED == 'true'

    permissions:
      contents: write   # push tags
      id-token: write   # OIDC for `deno publish` auth to JSR

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          # Use the PAT here too: the tag pushes from `dv release
          # --push` should trigger downstream workflows (e.g. a
          # docs deploy listening on tag events).
          token: ${{ secrets.DV_PAT }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: install dv from source
        run: |
          deno install --global --allow-all --name dv \
            "$GITHUB_WORKSPACE/apps/cli/src/main.ts"
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: configure git identity for tags
        run: |
          git config user.name "dv-release-bot"
          git config user.email "dv-release-bot@users.noreply.github.com"

      # Preview the plan — useful in logs even when the run is a
      # no-op. dv release --dry-run with --json gives the structured
      # awaiting-release set; we just render it for visibility.
      - name: preview the release plan
        run: dv release --dry-run --yes

      # The actual release. --push tells dv to push tags to origin
      # after publishing succeeds (the default publish-then-push
      # sequence means a failed publish doesn't leave an
      # unrecoverable pushed tag). `inputs.force` is empty on
      # push-triggered runs, set only via workflow_dispatch.
      - name: dv release
        run: |
          FORCE=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE="--force"
            echo "::warning::Running with --force; publish ops will re-run on already-tagged packages."
          fi
          dv release --yes --push $FORCE
