# Validate every PR before it can merge to main.
#
# This is the gate the CI integration guide
# (apps/docs/content/guides/ci-integration.md) describes — for *this*
# repo, since dv dogfoods itself. Three concerns covered:
#
#   1. Code stays clean: fmt, lint, type-check, tests all pass.
#   2. Records stay well-formed: dv validate catches malformed Records
#      and unresolved references before merge so the eventual Release
#      PR is computable.
#   3. The plugin contract holds: dv plugin verify against both the
#      example deno plugin (the canonical reference) and our own
#      release plugin (the one we'll publish with).
#
# Fast: every step is read-only, and DENO_DIR is cached between runs (see
# setup-deno's `cache: true` below). Failing fast on fmt means contributors
# get the typo back in <30s.

name: validate

on:
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same PR when new commits push — the
# old run's results would be stale anyway, and burning CI minutes
# on superseded commits is just waste.
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          # Cache DENO_DIR (jsr + npm modules, keyed on deno.lock) between
          # runs so we skip the network fetch + re-resolution every PR.
          # node_modules is Deno-managed (nodeModulesDir: auto) and rehydrates
          # from this cache, so the npm tree (Biome, rollup, vitepress) is
          # covered too. Default key is hashFiles('**/deno.lock') — this repo
          # has a single root lockfile, so the key is stable across the job.
          cache: true

      # Install dv from the working tree. We write our own launcher
      # script rather than `deno install --global`: the latter would
      # snapshot the file but lose the workspace context, so the
      # workspace's `imports` map (and therefore `@dv-cli/clipc`)
      # wouldn't resolve. The launcher we write is the same one
      # `deno task install` writes locally — runs `deno run --config
      # <deno.json> <main.ts>` so workspace state is live.
      #
      # Once @dv-cli/dv is on JSR in a known-good version this could
      # become `deno install -A --global jsr:@dv-cli/dv` instead,
      # which would be a single-line replacement.
      - name: install dv from source
        run: |
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/dv" <<EOF
          #!/bin/sh
          exec deno run --allow-all \\
            --config "$GITHUB_WORKSPACE/apps/cli/deno.json" \\
            "$GITHUB_WORKSPACE/apps/cli/src/main.ts" \\
            "\$@"
          EOF
          chmod +x "$HOME/.local/bin/dv"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # === code-quality gates ===

      - name: deno fmt (Biome + deno fmt for non-TS)
        run: deno task fmt

      - name: deno lint (Biome + deno lint)
        run: deno task lint

      - name: deno check (type-check entry points)
        run: |
          cd apps/cli
          deno task check

      - name: deno test (full suite, 300+ tests)
        run: |
          cd apps/cli
          deno task test

      # Publishability gate. `deno publish --dry-run` runs the same
      # slow-types check the real JSR publish does — the check that's
      # NOT part of fmt/lint/check/test. Without it, a public-API change
      # that trips `missing-explicit-type` sails through a green PR and
      # only fails at release time, after the tag is already minted
      # (the 0.8.0 partial-failure that motivated this step). Covers
      # both workspace members (@dv-cli/dv + @dv-cli/clipc).
      - name: deno publish --dry-run (slow-types gate, both packages)
        run: deno task publish:check

      # Doc-lint enforces JSDoc on the public surface of @dv-cli/dv and
      # @dv-cli/clipc. Hard gate as of #29: the backlog is cleared, so any
      # new undocumented public symbol (or a private-type leak into the
      # surface) fails the build rather than merely trending a count.
      - name: deno doc --lint
        run: deno task doc:lint

      # === dv-specific gates ===

      - name: dv validate (Records + config + plugin resolution)
        run: dv validate --json

      - name: dv plugin verify — example deno plugin
        run: dv plugin verify "run:deno run -A ./examples/plugins/deno/main.ts"

      - name: dv plugin verify — example npm plugin
        run: dv plugin verify "run:deno run -A ./examples/plugins/npm/main.ts"

      - name: dv plugin verify — tools/dv-release (our own release plugin)
        run: dv plugin verify "run:deno run -A ./tools/dv-release/main.ts"

      # The docs site has to build cleanly too — dead links + missing
      # rewrites are caught here, before they ship.
      - name: docs site build
        run: |
          cd apps/docs
          deno task build
