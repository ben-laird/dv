# Validate every PR before it can merge to main.
#
# The entire gate set lives in ONE place: apps/cli/src/scripts/ci.ts, run
# here and by `deno task verify` locally — they cannot drift, which is the
# point. To add or remove a gate, edit that script, not this workflow.
#
# The gates cover three concerns (see the CI integration guide,
# apps/docs/content/guides/ci-integration.md — this repo dogfoods itself):
#
#   1. Code stays clean: fmt, lint, type-check, tests, the slow-types
#      gate (publish:check), and JSDoc on the public surface (doc:lint).
#   2. Records stay well-formed: `dv validate` catches malformed Records
#      and unresolved references before merge.
#   3. The plugin contract holds: `dv plugin verify` against the example
#      deno + npm plugins and our own release plugin; plus the docs build.
#
# Fast: every gate is read-only, and DENO_DIR is cached between runs (see
# setup-deno's `cache: true` below). The script fails fast on the first
# failing gate.

name: validate

on:
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same PR when new commits push — the
# old run's results would be stale anyway, and burning CI minutes
# on superseded commits is just waste.
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          # Cache DENO_DIR (jsr + npm modules, keyed on deno.lock) between
          # runs so we skip the network fetch + re-resolution every PR.
          # node_modules is Deno-managed (nodeModulesDir: auto) and rehydrates
          # from this cache, so the npm tree (Biome, rollup, vitepress) is
          # covered too. Default key is hashFiles('**/deno.lock') — this repo
          # has a single root lockfile, so the key is stable across the job.
          cache: true

      # The single gate set, identical to the local `deno task verify`.
      # No "install dv" step is needed: the dv-specific gates invoke
      # apps/cli/src/main.ts directly (see the script). One failing gate
      # fails the job, with that gate's output dumped.
      - name: verify (fmt, lint, check, test, schemas, publish, doc, dv validate/verify, docs build)
        run: deno task verify
